<h2 class="nyx-title">Nyx esports お問い合わせフォーム</h2>

<form action="https://formspree.io/f/mdapkbgv" method="POST">
  <label>
    お名前
    <input type="text" name="name" required>
  </label>

  <label>
    メールアドレス
    <input type="email" name="email" required>
  </label>

  <label>
    お問い合わせ内容
    <textarea name="message" required></textarea>
  </label>

  <button type="submit">送信</button>
</form>
<style>
  .nyx-title {
    text-align: center;
    font-size: 28px;
    font-weight: 800;
    color: #d40000;
    margin-bottom: 24px;
    font-family: "Inter", sans-serif;
  }

  form {
    max-width: 600px; /* ← フォームを大きくした */
    margin: 0 auto;
    padding: 32px; /* ← 余白も増やして存在感UP */
    background: #0a0a0a;
    border: 1px solid #d40000;
    border-radius: 10px;
    color: #fff;
    font-family: "Inter", sans-serif;
  }

  label {
    display: block;
    margin-bottom: 20px;
    font-size: 16px; /* ← 少し大きく */
    font-weight: 600;
  }

  input, textarea {
    width: 100%;
    padding: 14px; /* ← 入力欄も大きく */
    margin-top: 8px;
    border: 1px solid #333;
    border-radius: 6px;
    background: #111;
    color: #fff;
    font-size: 15px;
  }

  textarea {
    height: 160px; /* ← テキストエリアも広く */
  }

  button {
    width: 100%;
    padding: 16px; /* ← ボタンも大きめ */
    background: #d40000;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #ff1a1a;
  }
</style>
